
<!DOCTYPE html>
<html>
<head>
<title>Student Grade Processing</title>
<style>
body{
    font-family:Arial;
    margin:40px;
}
button{
    padding:6px 12px;
    margin-top:10px;
}
#output{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>Student Grade Processing</h2>

<p><b>Original Marks:</b> <span id="original"></span></p>

<button onclick="processMarks()">Add 5 Bonus Marks</button>

<div id="output"></div>

<script>

const marks = [65,70,80,55,90];
document.getElementById("original").innerText = marks;

function processMarks(){

const updatedMarks = marks.map(mark => mark + 5);

console.log("Original:", marks);
console.log("Updated:", updatedMarks);

document.getElementById("output").innerText =
"Updated Marks: " + updatedMarks;

}

</script>

</body>
</html>
