
<!DOCTYPE html>
<html>
<head>
<title>Shopping Cart Total</title>
<style>
body{
    font-family:Arial;
    margin:40px;
}
button{
    padding:6px 12px;
    margin-top:10px;
}
#output{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>
<body>

<h2>Shopping Cart Total</h2>

<p><b>Cart Prices:</b> <span id="original"></span></p>

<button onclick="calculateTotal()">Calculate Total</button>

<div id="output"></div>

<script>

const cart = [500,1200,800,1500];
document.getElementById("original").innerText = cart;

function calculateTotal(){

const total = cart.reduce((sum, price) => sum + price, 0);

console.log("Cart Items:", cart);
console.log("Total:", total);

document.getElementById("output").innerText =
"Total Cart Value: " + total;

}

</script>

</body>
</html>
