<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Input Event</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    margin-top:120px;
}

input{
    padding:10px;
    width:250px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:5px;
}

</style>

</head>

<body>

<h2>Product Search</h2>

<input type="text" id="searchBox" placeholder="Search product">

<script>

document.getElementById("searchBox").addEventListener("keydown", (e) => {

    if(e.key === "Enter"){

        console.log("Search triggered");

        alert("Searching product...");

    }

});

</script>

</body>
</html>
