<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Button Event</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    text-align:center;
    margin-top:120px;
}

button{
    padding:12px 25px;
    font-size:16px;
    background-color:#007BFF;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background-color:#0056b3;
}

</style>

</head>

<body>

<h2>Login System</h2>

<button id="loginBtn">Login</button>

<script>

document.getElementById("loginBtn").addEventListener("click", (e) => {

    console.log("Login button clicked");

    alert("Login process started");

});

</script>

</body>
</html>
