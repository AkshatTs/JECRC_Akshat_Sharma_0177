<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mouse Hover Event</title>
<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
}

button{
    padding:12px 20px;
    font-size:16px;
    background-color:#28a745;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background-color:#1e7e34;
}

</style>
</head>

<body>

<button id="submitBtn">Submit</button>

<script>

document.getElementById("submitBtn").addEventListener("mouseover", () => {

    alert("Mouse hovered over submit button");

});

</script>

</body>
</html>
