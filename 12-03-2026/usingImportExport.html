<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Import/Export</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:10px;
            margin-top:10px;
        }

        button{
            padding:10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background:#007bff;
            color:white;
            font-weight:bold;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:15px;
            font-size:18px;
            font-weight:bold;
            color:green;
            text-align:center;
        }

        .pi{
            text-align:center;
            margin-bottom:10px;
            color:#444;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Utils Module Demo</h1>
        <div class="pi">
            Value of PI: <span id="piValue">Loading...</span>
        </div>
        <input type="number" id="num1" placeholder="Enter first number">
        <input type="number" id="num2" placeholder="Enter second number">
        <div class="buttons">
            <button onclick="calculate('add')">Add</button>
            <button onclick="calculate('subtract')">Subtract</button>
            <button onclick="calculate('multiply')">Multiply</button>
            <button onclick="calculate('divide')">Divide</button>
        </div>
        <div class="result" id="result">Result: </div>
    </div>
    <script type = "module">
        // Using Import/Export Project 1 (Utils Module)
        const  Utils = `
            export const PI = 3.14159;
            export function add(a, b) {
                return a + b;
            }
            export function subtract(a, b) {
                return a - b;
            }
            export function multiply(a, b) {
                return a * b;
            }
            export function divide(a, b) {
                if (b === 0) {
                    throw new Error("Cannot divide by zero");
                }
                return a / b;
            }
        `;
        const blob = new Blob([Utils], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        // Dynamically import the Utils module
        let mathModule;
        import (url).then((module) => {
            mathModule = module;
            document.getElementById('piValue').innerText = module.PI;
        }).catch((error) => {
            console.error("Error loading module:", error);
        });
        window.calculate = function(operation) {
            const a = parseFloat(document.getElementById('num1').value);
            const b = parseFloat(document.getElementById('num2').value);
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').innerText = "Please enter valid numbers.";
                return;
            }
            try{
                let result;
                if (operation === 'add') {
                    result = mathModule.add(a, b);
                } 
                if (operation === 'subtract') {
                    result = mathModule.subtract(a, b);
                } 
                if (operation === 'multiply') {
                    result = mathModule.multiply(a, b);
                } 
                if (operation === 'divide') {
                    result = mathModule.divide(a, b);
                }
                document.getElementById('result').innerText = `Result: ${result}`;
            }
            catch(error){
                document.getElementById('result').innerText = error.message;
            }
        }
        import(url).then((module) => {
            console.log("PI:", module.PI);
            console.log("Add:", module.add(5, 3));
            console.log("Subtract:", module.subtract(5, 3));
            console.log("Multiply:", module.multiply(5, 3));
            console.log("Divide:", module.divide(5, 3));
        }).catch((error) => {
            console.error("Error loading module:", error);
        });
    </script>
</body>
</html>
